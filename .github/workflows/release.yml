name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

# Default to read-only. Jobs that need to write (release, publish) override.
permissions:
  contents: read

jobs:
  # Gate: every downstream job depends transitively on this. A tag on a
  # broken commit cannot produce a partial release (e.g. GitHub Release
  # created but sdist or wheel build failing later in the pipeline).
  verify:
    name: Pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      - name: Verify sdist builds
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: facto-run
          command: sdist
          args: --out dist

  create-release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1
        with:
          changelog: CHANGES.md
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-binaries:
    name: Upload binary (${{ matrix.target }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: facto
          target: ${{ matrix.target }}
          archive: facto-$target-$tag
          token: ${{ secrets.GITHUB_TOKEN }}

  build-wheels:
    name: Build wheel (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            manylinux: musllinux_1_2
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            manylinux: musllinux_1_2
          - target: x86_64-apple-darwin
            os: macos-latest
            manylinux: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            manylinux: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            manylinux: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: facto-run
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}
      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.target }}
          path: facto-run/dist/*.whl

  build-sdist:
    name: Build source distribution
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: facto-run
          command: sdist
          args: --out dist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: facto-run/dist/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    needs: [create-release, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    # Gated behind a protected environment: any tag flows through
    # build-wheels + build-sdist as a free dry-run; upload requires manual
    # approval in the Actions UI. Auth via OIDC trusted publishing, so no
    # token is stored; the job mints a short-lived credential from PyPI.
    environment:
      name: pypi
      url: https://pypi.org/project/facto.run/
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          skip-existing: true

  publish-crates:
    name: Publish to crates.io
    needs: [create-release, upload-binaries]
    runs-on: ubuntu-latest
    # Gated behind a protected environment. Auth via OIDC trusted publishing:
    # crates-io-auth-action mints a short-lived token (no stored secret),
    # auto-revoked when the job ends. The trusted publisher must be configured
    # on each crate first; a crate's very first version is published manually.
    environment:
      name: crates-io
      url: https://crates.io/crates/facto-run
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: Publish facto-core
        run: cargo publish -p facto-core --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index propagation
        run: sleep 60
      - name: Publish facto-mcp
        run: cargo publish -p facto-mcp --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index propagation
        run: sleep 60
      - name: Publish facto-run
        run: cargo publish -p facto-run --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
