name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

# Default to read-only. Jobs that need to write (release, publish) override.
permissions:
  contents: read

jobs:
  # Gate: every downstream job depends transitively on this. A tag on a
  # broken commit cannot produce a partial release (e.g. GitHub Release
  # created but sdist or wheel build failing later in the pipeline).
  verify:
    name: Pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      - name: Verify sdist builds
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: facto-run
          command: sdist
          args: --out dist

  create-release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Generate release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
      - uses: taiki-e/create-gh-release-action@f67cf7b2dadd83d36b981e674a6b08063997ce68 # v1
        with:
          changelog: CHANGES.md
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-binaries:
    name: Upload binary (${{ matrix.target }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: taiki-e/upload-rust-binary-action@10c1cf6a3da113ad4e60018e386570529aa5f1d3 # v1
        with:
          bin: facto
          target: ${{ matrix.target }}
          archive: facto-$target-$tag
          token: ${{ secrets.GITHUB_TOKEN }}

  build-wheels:
    name: Build wheel (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            manylinux: musllinux_1_2
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            manylinux: musllinux_1_2
          - target: x86_64-apple-darwin
            os: macos-latest
            manylinux: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            manylinux: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            manylinux: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: facto-run
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}
      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-${{ matrix.target }}
          path: facto-run/dist/*.whl

  build-sdist:
    name: Build source distribution
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: facto-run
          command: sdist
          args: --out dist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdist
          path: facto-run/dist/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    needs: [create-release, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    # Gated behind a protected environment. Same pattern as publish-crates:
    # any tag flows through build-wheels + build-sdist as a free dry-run;
    # upload to PyPI requires manual approval in the Actions UI.
    environment:
      name: pypi
      url: https://pypi.org/project/facto.run/
    steps:
      - name: Download wheels
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          path: dist
          merge-multiple: true
      - name: Upload to PyPI
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: [create-release, upload-binaries]
    runs-on: ubuntu-latest
    # Gated behind a protected environment. Approval required from a
    # configured reviewer before the workflow publishes any crate.
    # Lets any tag (including v*-rc*, v*-test*) flow through create-release
    # and upload-binaries as a dry-run, while publishing stays manual-opt-in.
    environment:
      name: crates-io
      url: https://crates.io/crates/facto-run
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Publish facto-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p facto-core --locked
      - name: Wait for crates.io index propagation
        run: sleep 60
      - name: Publish facto-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p facto-mcp --locked
      - name: Wait for crates.io index propagation
        run: sleep 60
      - name: Publish facto-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p facto-run --locked
