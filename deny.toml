# cargo-deny policy for facto
# Run locally: cargo deny check
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Check all targets, not just the host.
all-features = false

[advisories]
# RustSec advisory database.
# Fail on any unfixed CVE in the dependency tree.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# ignore lists specific advisory IDs if ever needed.
ignore = []

[licenses]
# Accept permissive licenses compatible with MIT.
# Extend this list only after verifying the new license is permissive and
# compatible with our downstream distribution model (MIT-licensed binary).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    # webpki-root-certs uses CDLA-Permissive-2.0 (Community Data License).
    # It is a permissive license for data distribution; root certificate
    # lists are effectively public-domain equivalent.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Fail on multiple versions of the same crate unless explicitly allowed.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Allowlist for known unavoidable duplicates (mostly transitive).
skip = []
skip-tree = []

[sources]
# Only allow crates.io as a source.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
